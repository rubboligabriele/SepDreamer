  kl_free: 3.0
  device: 'cuda:0'
  imag_gradient: 'dynamics'
  training: False

  fm:
    {use_fm: False, fm_units: 32}
  decoder:
    {act: 'SiLU', norm: True, mlp_layers: 3, mlp_units: 32, feature_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'onehot', entropy: 1e-4, unimix_ratio: 0.2, std: 'none', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 1e-6, eps: 1e-8, grad_clip: 100.0, outscale: 0.01}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 1e-6, eps: 1e-8, grad_clip: 100.0, outscale: 0.0}
  reward_head:
